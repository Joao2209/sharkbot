<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SharkBot Dashboard</title>
    <meta name="theme-color" content="#0a0a0b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SharkBot" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
    <link rel="icon" href="assets/icon-192.png" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="screen">
      <header class="topbar">
        <div class="brand">
          <div class="logo">
            <img src="assets/icon-shark.svg" alt="Shark Bot" />
          </div>
          <div class="brand-text">
            <img src="assets/logo-shark.svg" alt="Shark Bot" />
          </div>
        </div>
        <div class="top-actions">
          <button class="icon-btn" aria-label="Ajuda">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="9" fill="none" stroke="#8ea1b8" stroke-width="1.5" />
              <path d="M9.8 9.2a2.4 2.4 0 1 1 3.9 2c-.7.5-1.7 1-1.7 2.1" fill="none" stroke="#8ea1b8" stroke-width="1.5" stroke-linecap="round" />
              <circle cx="12" cy="17" r="1" fill="#8ea1b8" />
            </svg>
          </button>
          <button class="icon-btn" aria-label="Configurações">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 8.2a3.8 3.8 0 1 0 0 7.6 3.8 3.8 0 0 0 0-7.6zm9 3-1.8-.3a7.4 7.4 0 0 0-1-2.3l1-1.5-2.1-2.1-1.5 1a7.4 7.4 0 0 0-2.3-1L13.8 2h-3.6l-.3 1.8a7.4 7.4 0 0 0-2.3 1l-1.5-1-2.1 2.1 1 1.5a7.4 7.4 0 0 0-1 2.3L3 11.2v3.6l1.8.3a7.4 7.4 0 0 0 1 2.3l-1 1.5 2.1 2.1 1.5-1a7.4 7.4 0 0 0 2.3 1l.3 1.8h3.6l.3-1.8a7.4 7.4 0 0 0 2.3-1l1.5 1 2.1-2.1-1-1.5a7.4 7.4 0 0 0 1-2.3l1.8-.3v-3.6z" fill="none" stroke="#8ea1b8" stroke-width="1.2" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
      </header>

      <section class="tabs">
        <button class="tab active">Hoje</button>
        <button class="tab">Ontem</button>
        <button class="tab">7d</button>
        <button class="tab">30d</button>
        <button class="tab">Total</button>
      </section>

      <section class="card">
        <div class="card-head">
          <div class="icon-chip">
            <img src="assets/icon-money.svg" alt="" />
          </div>
          <div>
            <div class="card-title">Vendas Aprovadas</div>
          </div>
        </div>
        <div class="card-metric" id="approvedValue">R$ 0,00</div>
        <div class="progress">
          <div class="progress-bar" id="approvedProgress" style="width: 0%"></div>
        </div>
        <div class="card-foot">
          <span id="approvedPercent">0% Aprov.</span>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <div class="icon-chip">
            <img src="assets/icon-chart.svg" alt="" />
          </div>
          <div>
            <div class="card-title">Taxa de Conversão</div>
          </div>
        </div>
        <div class="gauge">
          <svg viewBox="0 0 200 120" aria-hidden="true">
            <defs>
              <linearGradient id="g2" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="#22f0ff" />
                <stop offset="1" stop-color="#0b67ff" />
              </linearGradient>
            </defs>
            <path d="M20 100a80 80 0 0 1 160 0" fill="none" stroke="#1f2a38" stroke-width="18" stroke-linecap="round" />
            <path d="M20 100a80 80 0 0 1 160 0" fill="none" stroke="url(#g2)" stroke-width="18" stroke-linecap="round" stroke-dasharray="252" stroke-dashoffset="0" />
          </svg>
          <div class="gauge-label">
            <div class="gauge-value">100.00%</div>
            <div class="gauge-sub" id="approvedPix">0 pagos de 0 PIX</div>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <div class="icon-chip">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 12h4l2-5 3 10 2-5h5" fill="none" stroke="#22f0ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
              <circle cx="12" cy="12" r="10" fill="none" stroke="#0b67ff" stroke-width="1" opacity="0.4" />
            </svg>
          </div>
          <div>
            <div class="card-title">Seu Desempenho</div>
            <div class="card-sub">ÚLTIMOS 7 DIAS</div>
          </div>
        </div>
        <div class="stats-row">
          <div class="pill">
            <div class="pill-label">Cliques</div>
            <div class="pill-value">3</div>
          </div>
          <div class="pill">
            <div class="pill-label">Leads</div>
            <div class="pill-value">1</div>
          </div>
          <div class="pill">
            <div class="pill-label">Vendas</div>
            <div class="pill-value">1</div>
          </div>
        </div>
      </section>

      <nav class="bottom-nav">
        <button class="nav-item active">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 11l8-7 8 7v8a1 1 0 0 1-1 1h-4v-6H9v6H5a1 1 0 0 1-1-1z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
          </svg>
          <span>Home</span>
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 20V9M12 20V4M19 20v-6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
          </svg>
          <span>Analytics</span>
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 7h6l2 4h6M7 17a2 2 0 1 0 0 .1M17 17a2 2 0 1 0 0 .1" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <span>Fluxos</span>
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 12a5 5 0 0 1 10 0M4 20a8 8 0 0 1 16 0" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
          </svg>
          <span>Clientes</span>
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 5h6v6H4zM14 5h6v6h-6zM4 13h6v6H4zM14 13h6v6h-6z" fill="none" stroke="currentColor" stroke-width="1.4" />
          </svg>
          <span>Mais</span>
        </button>
      </nav>
    </div>
    <script>
      const DAILY_TARGET = 1000;
      const TICKET_VALUE = 9.85;
      const valueEl = document.getElementById("approvedValue");
      const progressEl = document.getElementById("approvedProgress");
      const percentEl = document.getElementById("approvedPercent");
      const pixEl = document.getElementById("approvedPix");
      let lastApprovedCount = 0;
      let initialized = false;

      const getDateKey = () => {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, "0");
        const d = String(now.getDate()).padStart(2, "0");
        return `${y}-${m}-${d}`;
      };

      const formatBRL = (value) =>
        new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(value);

      const getProgressValue = () => {
        const now = new Date();
        const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const end = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
        const elapsed = now - start;
        const total = end - start;
        const ratio = Math.min(Math.max(elapsed / total, 0), 1);
        return {
          value: Math.round(DAILY_TARGET * ratio * 100) / 100,
          ratio,
          start,
          end,
        };
      };

      const mulberry32 = (seed) => {
        let t = seed >>> 0;
        return () => {
          t += 0x6d2b79f5;
          let r = Math.imul(t ^ (t >>> 15), 1 | t);
          r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
          return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
        };
      };

      const getSchedule = () => {
        const key = getDateKey();
        const cached = localStorage.getItem("salesSchedule");
        if (cached) {
          try {
            const data = JSON.parse(cached);
            if (data?.dateKey === key && Array.isArray(data?.times)) {
              return data.times.map((t) => new Date(t));
            }
          } catch {
            // ignore
          }
        }

        const { start, end } = getProgressValue();
        const totalMs = end - start;
        const salesCount = Math.ceil(DAILY_TARGET / TICKET_VALUE);
        const seed = Number(key.replaceAll("-", ""));
        const rnd = mulberry32(seed);
        const bucket = totalMs / salesCount;
        const times = [];

        for (let i = 0; i < salesCount; i += 1) {
          const base = bucket * (i + 1);
          const jitter = (rnd() - 0.5) * bucket * 0.6;
          const t = Math.min(Math.max(base + jitter, bucket * i + 1000), bucket * (i + 1) - 1000);
          times.push(new Date(start.getTime() + t));
        }

        const payload = {
          dateKey: key,
          times: times.map((t) => t.toISOString()),
        };
        localStorage.setItem("salesSchedule", JSON.stringify(payload));
        return times;
      };

      let schedule = getSchedule();

      const tick = () => {
        const nowKey = getDateKey();
        const cached = localStorage.getItem("salesSchedule");
        if (!cached || !cached.includes(nowKey)) {
          schedule = getSchedule();
          initialized = false;
        }

        const now = new Date();
        const approvedCount = schedule.filter((t) => t <= now).length;
        const approvedValue = Math.min(approvedCount * TICKET_VALUE, DAILY_TARGET);
        const ratio = Math.min(approvedValue / DAILY_TARGET, 1);

        valueEl.textContent = formatBRL(approvedValue);
        progressEl.style.width = `${(ratio * 100).toFixed(2)}%`;
        percentEl.textContent = `${Math.round(ratio * 100)}% Aprov.`;
        pixEl.textContent = `${approvedCount} pagos de ${approvedCount} PIX`;

        if (!initialized) {
          lastApprovedCount = approvedCount;
          initialized = true;
          return;
        }

        if (approvedCount > lastApprovedCount) {
          const diff = approvedCount - lastApprovedCount;
          for (let i = 0; i < diff; i += 1) {
            setTimeout(() => notifySale(TICKET_VALUE), i * 500);
          }
        }
        lastApprovedCount = approvedCount;
      };

      tick();
      setInterval(tick, 30000);

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("sw.js");
        });
      }

      const requestNotificationPermission = () => {
        if (!("Notification" in window)) return;
        if (Notification.permission === "default") {
          Notification.requestPermission();
        }
      };

      const ensureNotificationsEnabled = () => {
        if (!("Notification" in window)) {
          alert("Seu navegador não suporta notificações.");
          return;
        }

        if (Notification.permission === "denied") {
          alert(
            "As notificações estão bloqueadas. Ative nas configurações do navegador para receber alertas de venda."
          );
          return;
        }

        if (Notification.permission === "default") {
          requestNotificationPermission();
        }
      };

      const notifySale = (value) => {
        if (!("Notification" in window)) return;
        if (Notification.permission !== "granted") return;

        const title = "🐟 Nova Venda!";
        const body = `Você recebeu ${formatBRL(value)}`;
        const icon = "assets/icon-192.png";

        if ("serviceWorker" in navigator && navigator.serviceWorker.controller) {
          navigator.serviceWorker.controller.postMessage({
            type: "sale-notification",
            title,
            body,
            icon,
          });
        } else {
          new Notification(title, { body, icon, badge: icon });
        }
      };

      document.addEventListener(
        "click",
        () => {
          ensureNotificationsEnabled();
        },
        { once: true }
      );
    </script>
  </body>
</html>
